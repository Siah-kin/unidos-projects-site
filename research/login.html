<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Research Portal Login - Unidos</title>
    <link href="https://fonts.googleapis.com/css2?family=Vollkorn:wght@400;600;700&family=Lato:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Lato', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #f8f9fa;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .login-container {
            background: white;
            border-radius: 12px;
            box-shadow: 0 8px 40px rgba(0, 0, 0, 0.1);
            max-width: 440px;
            width: 100%;
            padding: 0;
            overflow: hidden;
        }
        .brand-bar {
            background: linear-gradient(135deg, #268575 0%, #176255 100%);
            padding: 32px 40px 28px;
            text-align: center;
            border-bottom: 4px solid #ffa62b;
        }
        .brand-bar img { width: 56px; height: 56px; border-radius: 50%; margin-bottom: 12px; background: white; padding: 4px; }
        .brand-bar h1 {
            font-family: 'Vollkorn', serif;
            color: white;
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 4px;
        }
        .brand-bar p { color: rgba(255, 255, 255, 0.8); font-size: 13px; }
        .member-badge {
            background: #ffa62b;
            color: #212421;
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 700;
            display: inline-block;
            margin-bottom: 14px;
            letter-spacing: 0.5px;
            text-transform: uppercase;
        }
        .form-area { padding: 36px 40px 40px; }
        .form-group { margin-bottom: 22px; }
        label { display: block; color: #212421; font-size: 14px; font-weight: 600; margin-bottom: 8px; }
        input[type="email"], input[type="password"] {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 15px;
            font-family: 'Lato', sans-serif;
            transition: all 0.3s ease;
        }
        input:focus {
            outline: none;
            border-color: #268575;
            box-shadow: 0 0 0 4px rgba(38, 133, 117, 0.1);
        }
        .btn {
            width: 100%;
            padding: 14px;
            background: #ffa62b;
            color: #212421;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-family: 'Lato', sans-serif;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .btn:hover { background: #e8951f; transform: translateY(-1px); box-shadow: 0 4px 12px rgba(255, 166, 43, 0.35); }
        .btn:active { transform: translateY(0); }
        .error-message {
            background: #fee;
            color: #c33;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 14px;
            display: none;
        }
        .info-text { text-align: center; margin-top: 24px; font-size: 13px; color: #5b5c61; }
        .info-text a { color: #268575; text-decoration: none; font-weight: 600; }
        .info-text a:hover { color: #176255; text-decoration: underline; }
        @media (max-width: 480px) {
            .brand-bar { padding: 24px 24px 20px; }
            .form-area { padding: 28px 24px 32px; }
            .brand-bar h1 { font-size: 20px; }
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="brand-bar">
            <img src="../images/unidos-logo.png" alt="Unidos Logo">
            <div class="member-badge">MEMBERS ONLY</div>
            <h1>Unidos Research Portal</h1>
            <p>DAO Transformation Research</p>
        </div>
        <div class="form-area">
            <div class="error-message" id="errorMessage"></div>
            <form id="loginForm">
                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" placeholder="your@email.com" required>
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" placeholder="Enter your password" required>
                </div>
                <button type="submit" class="btn">Sign In</button>
            </form>
            <div class="info-text">
                <a href="../index.html">&larr; Back to main site</a>
            </div>
        </div>
    </div>
    <script>
        document.getElementById('loginForm').addEventListener('submit', (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const err = document.getElementById('errorMessage');
            err.textContent = 'Authentication service not configured. Please contact the administrator.';
            err.style.display = 'block';
        });
    </script>
</body>
</html>
